name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binary:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-15-intel, name: darwin-x64 }
          - { os: macos-14, name: darwin-arm64 }
          - { os: ubuntu-latest, name: linux-x64 }
          - { os: ubuntu-24.04-arm, name: linux-arm64 }
          - { os: windows-latest, name: windows-x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter agentpack build
      - name: Compile standalone binary
        shell: bash
        run: |
          OUT="agentpack-${{ matrix.name }}"
          if [ "${{ matrix.name }}" = "windows-x64" ]; then OUT="$OUT.exe"; fi
          bun build apps/cli/dist/cli.mjs --compile --outfile "$OUT"
      - name: Checksum
        shell: bash
        run: |
          OUT="agentpack-${{ matrix.name }}"
          if [ "${{ matrix.name }}" = "windows-x64" ]; then OUT="$OUT.exe"; fi
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$OUT" > "checksum-${{ matrix.name }}.txt"
          else
            shasum -a 256 "$OUT" > "checksum-${{ matrix.name }}.txt"
          fi
      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: agentpack-${{ matrix.name }}*
      - name: Store checksum for finalize
        uses: actions/upload-artifact@v4
        with:
          name: checksum-${{ matrix.name }}
          path: checksum-${{ matrix.name }}.txt
          retention-days: 1

  finalize:
    name: finalize release
    runs-on: ubuntu-latest
    needs: build-binary
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: checksum-*
          merge-multiple: true
      - name: Combine checksums
        run: cat checksum-*.txt > SHA256SUMS && cat SHA256SUMS
      - name: Upload combined checksums + notes
        uses: softprops/action-gh-release@v2
        with:
          files: SHA256SUMS
          generate_release_notes: true
